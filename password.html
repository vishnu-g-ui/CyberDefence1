<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberDefence – Password Checker</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body{background:linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.9)),url('img/password.jpeg') center/cover no-repeat fixed;min-height:100vh;}
  </style>
</head>
<body>
<nav>
  <div class="logo">CyberDefence</div>
  <button class="nav-toggle" onclick="toggleNav()">☰</button>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="card.html">Tools</a></li>
    <li><a href="card.html">Attack Lab</a></li>
    <li><a href="https://vishnu-profile.lovable.app">About</a></li>
    <li><a href="https://vishnu-profile.lovable.app">Contact</a></li>
  </ul>
  <div id="authArea"><a href="index.html" class="btn">Login</a></div>
</nav>

<div class="pass-container">
  <h2>Password Strength Checker</h2>
  <form onsubmit="checkPassword(event)">
    <input type="password" id="password" placeholder="Enter your password"/>
    <button class="check-btn" type="submit">Check Password</button>
  </form>
  <div class="strength"><div id="strengthBar"></div></div>
  <p id="result-pass"></p>
</div>

<script type="module">
  import { db, auth } from './firebase-config.js';
  import { onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { ref, push }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  let currentUser = null;
  onAuthStateChanged(auth, user => {
    currentUser = user;
    const area = document.getElementById('authArea');
    if (user) {
      const name = user.email.split('@')[0];
      area.innerHTML = `<span style="color:#38bdf8;font-size:.85rem;">👋 ${name}</span>
        <button style="background:none;border:1px solid rgba(239,68,68,.4);color:#ef4444;border-radius:20px;padding:4px 12px;font-size:.8rem;cursor:pointer;margin-left:6px;" onclick="doLogout()">Logout</button>`;
    }
  });
  window.doLogout  = () => signOut(auth).then(() => location.href='index.html');
  window.toggleNav = () => document.getElementById('navLinks').classList.toggle('open');

  window.checkPassword = async (e) => {
    e.preventDefault();
    const pwd = document.getElementById('password').value;
    let hasU=false,hasL=false,hasD=false,hasS=false;
    for (let c of pwd) {
      if (c>='A'&&c<='Z') hasU=true;
      else if (c>='a'&&c<='z') hasL=true;
      else if (c>='0'&&c<='9') hasD=true;
      else hasS=true;
    }
    let tips=[],score=0;
    if (pwd.length>=8) score++; else tips.push('At least 8 characters');
    if (hasU) score++; else tips.push('Add uppercase (A-Z)');
    if (hasL) score++; else tips.push('Add lowercase (a-z)');
    if (hasD) score++; else tips.push('Add a number (0-9)');
    if (hasS) score++; else tips.push('Add special character (@#$...)');

    const bar=document.getElementById('strengthBar'), res=document.getElementById('result-pass');
    let level;
    if (score<=2)      { bar.style.width='33%';  bar.style.background='red';       level='Weak';   res.innerHTML='❌ Weak Password<br>'+tips.join('<br>'); }
    else if (score<=4) { bar.style.width='66%';  bar.style.background='orange';    level='Medium'; res.innerHTML='⚠ Medium Password<br>'+tips.join('<br>'); }
    else               { bar.style.width='100%'; bar.style.background='limegreen'; level='Strong'; res.innerHTML='✅ Strong Password!'; }

    try {
      await push(ref(db,'passwordChecks'), {
        strength: level, score, length: pwd.length,
        user:      currentUser ? currentUser.email : 'anonymous',
        timestamp: Date.now()
      });
    } catch(e) { console.log(e); }
  };
</script>
</body>
</html>
