<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength Checker</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
                  url('img/password.jpeg');
      background-size: cover;
      background-position: center;
      min-height: 100vh;
    }
  </style>
</head>
<body>
 
<!-- Navbar -->
<nav>
  <div class="logo">CyberDefence</div>
  <button class="nav-toggle" onclick="toggleNav()">☰</button>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="card.html">Tools</a></li>
    <li><a href="card.html">Attack Lab</a></li>
    <li><a href="https://vishnu-profile.lovable.app">About</a></li>
    <li><a href="https://vishnu-profile.lovable.app">Contact</a></li>
  </ul>
  <button class="login-btn">Login</button>
</nav>
 
<!-- Password Checker -->
<div class="pass-container">
  <h2>Password Strength Checker</h2>
  <form onsubmit="checkPassword(event)">
    <input type="password" id="password" placeholder="Enter your password">
    <button class="check-btn" type="submit">Check Password</button>
  </form>
  <div class="strength">
    <div id="strengthBar"></div>
  </div>
  <p id="result-pass"></p>
</div>
 
<script>
  function toggleNav() {
    document.getElementById('navLinks').classList.toggle('open');
  }
 
  function checkPassword(event) {
    event.preventDefault();
    let password = document.getElementById("password").value;
    let hasUpper = false, hasLower = false, hasDigit = false, hasSpecial = false;
    let suggestions = [];
 
    for (let ch of password) {
      if (ch >= 'A' && ch <= 'Z') hasUpper = true;
      else if (ch >= 'a' && ch <= 'z') hasLower = true;
      else if (ch >= '0' && ch <= '9') hasDigit = true;
      else hasSpecial = true;
    }
 
    if (password.length < 8)  suggestions.push("Password should be at least 8 characters");
    if (!hasUpper)   suggestions.push("Add an uppercase letter (A-Z)");
    if (!hasLower)   suggestions.push("Add a lowercase letter (a-z)");
    if (!hasDigit)   suggestions.push("Add a number (0-9)");
    if (!hasSpecial) suggestions.push("Add a special character (@,#,$ etc)");
 
    let result = document.getElementById("result-pass");
    let bar    = document.getElementById("strengthBar");
    let strength = 0;
 
    if (password.length >= 8) strength++;
    if (hasUpper)   strength++;
    if (hasLower)   strength++;
    if (hasDigit)   strength++;
    if (hasSpecial) strength++;
 
    if (strength <= 2) {
      bar.style.width = "33%"; bar.style.background = "red";
      result.innerHTML = "❌ Weak Password<br>" + suggestions.join("<br>");
    } else if (strength <= 4) {
      bar.style.width = "66%"; bar.style.background = "orange";
      result.innerHTML = "⚠ Medium Password<br>" + suggestions.join("<br>");
    } else {
      bar.style.width = "100%"; bar.style.background = "limegreen";
      result.innerHTML = "✅ Strong Password";
    }
  }
</script>
</body>
</html>
