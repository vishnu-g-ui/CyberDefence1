<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberDefence – Phish Checker</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body{background:linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.9)),url('img/thumb-1920-480530.png') center/cover no-repeat fixed;min-height:100vh;}
  </style>
</head>
<body>
<nav>
  <div class="logo">CyberDefence</div>
  <button class="nav-toggle" onclick="toggleNav()">☰</button>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="card.html">Tools</a></li>
    <li><a href="card.html">Attack Lab</a></li>
    <li><a href="https://vishnu-profile.lovable.app">About</a></li>
    <li><a href="https://vishnu-profile.lovable.app">Contact</a></li>
  </ul>
  <div id="authArea"><a href="index.html" class="btn">Login</a></div>
</nav>

<div class="main-container">
  <h2>Phishing Website Detector</h2>
  <div class="phish-search">
    <input type="text" id="urlInput" placeholder="Enter Website URL e.g. https://google.com"/>
    <button onclick="checkURL()">Check</button>
    <p id="result"></p>
    <ul id="reasons"></ul>
  </div>
</div>

<script type="module">
  import { db, auth } from './firebase-config.js';
  import { onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { ref, push }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  let currentUser = null;
  onAuthStateChanged(auth, user => {
    currentUser = user;
    const area = document.getElementById('authArea');
    if (user) {
      const name = user.email.split('@')[0];
      area.innerHTML = `<span style="color:#38bdf8;font-size:.85rem;">👋 ${name}</span>
        <button style="background:none;border:1px solid rgba(239,68,68,.4);color:#ef4444;border-radius:20px;padding:4px 12px;font-size:.8rem;cursor:pointer;margin-left:6px;" onclick="doLogout()">Logout</button>`;
    }
  });
  window.doLogout  = () => signOut(auth).then(() => location.href='index.html');
  window.toggleNav = () => document.getElementById('navLinks').classList.toggle('open');

  window.checkURL = async () => {
    const url        = document.getElementById('urlInput').value.trim();
    const result     = document.getElementById('result');
    const reasonList = document.getElementById('reasons');
    reasonList.innerHTML = '';
    if (!url) { result.textContent='Please enter a URL'; result.className='danger show'; return; }

    const suspiciousWords = ['-login','-verify','-bank','-secure','-account','-update','-confirm'];
    let score=0, reasons=[];

    if (url.length > 50)           { score++; reasons.push('URL is very long'); }
    if (url.split('.').length > 4) { score++; reasons.push('Too many subdomains'); }
    if (url.includes('@'))         { score++; reasons.push('Contains @ symbol'); }
    if (!url.startsWith('http'))   { score++; reasons.push('Invalid URL format'); }
    if (url.startsWith('http://')) { score++; reasons.push('Not using HTTPS (insecure)'); }
    else if (url.startsWith('https://')) reasons.push('✅ Using HTTPS');
    for (let w of suspiciousWords)
      if (url.toLowerCase().includes(w)) { score++; reasons.push('Suspicious keyword: '+w); }

    let verdict, isSafe;
    if (!url.startsWith('http'))   { verdict='⚠️ Invalid URL';       isSafe=false; }
    else if (score >= 2)           { verdict='🔴 Likely Phishing!';  isSafe=false; }
    else                           { verdict='✅ Looks Safe';         isSafe=true;  }

    result.textContent = verdict;
    result.className   = (isSafe ? 'safe' : 'danger') + ' show';
    reasons.forEach(r => { const li=document.createElement('li'); li.textContent=r; reasonList.appendChild(li); });

    try {
      await push(ref(db,'phishChecks'), {
        url, verdict, score, isSafe,
        user:      currentUser ? currentUser.email : 'anonymous',
        timestamp: Date.now()
      });
    } catch(e) { console.log(e); }
  };

  document.getElementById('urlInput').addEventListener('keypress', e => {
    if (e.key==='Enter') { e.preventDefault(); window.checkURL(); }
  });
</script>
</body>
</html>
