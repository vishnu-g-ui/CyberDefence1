<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberDefence</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
                  url('img/thumb-1920-480530.png');
      background-size: cover;
      background-position: center;
      min-height: 100vh;
    }
  </style>
</head>
<body>
 
<!-- Navbar -->
<nav>
  <div class="logo">CyberDefence</div>
  <button class="nav-toggle" onclick="toggleNav()">☰</button>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="card.html">Tools</a></li>
    <li><a href="card.html">Attack Lab</a></li>
    <li><a href="https://vishnu-profile.lovable.app">About</a></li>
    <li><a href="https://vishnu-profile.lovable.app">Contact</a></li>
  </ul>
  <button class="btn">Login</button>
</nav>
 
<!-- Main -->
<div class="main-container">
  <h2>Phishing Website Detector</h2>
  <div class="phish-search">
    <input type="text" id="urlInput" placeholder="Enter Website URL">
    <button onclick="checkURL()">Check</button>
    <p id="result"></p>
    <ul id="reasons"></ul>
  </div>
</div>
 
<script>
  function toggleNav() {
    document.getElementById('navLinks').classList.toggle('open');
  }
 
  function checkURL() {
    let url = document.getElementById("urlInput").value;
    let suspiciousWords = ["-login", "-verify", "-bank", "-secure", "-account", "-update"];
    let score = 0;
    let reasons = [];
    let result = document.getElementById("result");
    let reasonList = document.getElementById("reasons");
    reasonList.innerHTML = "";
 
    if (url.length > 30) { score++; reasons.push("URL is too long"); }
    if (url.startsWith("https://")) { reasons.push("Website is using HTTPS (secure)"); }
    else if (url.startsWith("http://")) { score++; reasons.push("Website is using HTTP (not secure)"); }
    else { score++; reasons.push("Invalid URL format"); }
 
    for (let word of suspiciousWords) {
      if (url.includes(word)) { score++; reasons.push("Suspicious word detected: " + word); }
    }
 
    if (url.startsWith("https://") && score < 2) {
      result.innerText = "✅ Website looks Safe";
      result.className = "safe show";
    } else if (url.startsWith("http://")) {
      result.innerText = "⚠️ Website is Not Safe";
      result.className = "danger show";
    } else {
      result.innerText = "⚠️ Invalid URL";
      result.className = "danger show";
    }
 
    for (let r of reasons) {
      let li = document.createElement("li");
      li.innerText = r;
      reasonList.appendChild(li);
    }
  }
 
  document.getElementById("urlInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") { e.preventDefault(); checkURL(); }
  });
</script>
</body>
</html>
