<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberDefence – Email Breach</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body{background:linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.9)),url('img/tJfDsy74xZ08sfIIhFWJlUb0ImwClHmYgwLKrEYHreGxzvLVK31BkNS2Vwq235tPmJ9YByvMEqCWI3JVDFXYcoAtNXxGegdcpXr3U8dt0Ss.jpeg') center/cover no-repeat fixed;min-height:100vh;display:flex;flex-direction:column;}
    .email-wrap{flex:1;display:flex;justify-content:center;align-items:center;padding:2rem 1rem;}
    .email-card{text-align:center;background:#1e293b;padding:36px 28px;border-radius:15px;width:100%;max-width:380px;box-shadow:0 0 20px rgba(0,255,150,0.2);}
    .email-card h1{font-size:clamp(1.1rem,4vw,1.5rem);margin-bottom:10px;}
    .email-card p{margin-bottom:20px;color:#94a3b8;font-size:0.9rem;}
    .email-card input{width:100%;padding:12px;border:none;border-radius:8px;outline:none;font-size:14px;margin-bottom:10px;}
    .email-card button{width:100%;padding:12px;border:none;border-radius:8px;background:#22c55e;color:white;font-weight:bold;cursor:pointer;transition:0.3s;font-size:1rem;}
    .email-card button:hover{background:#16a34a;}
    .result-email{margin-top:20px;font-size:16px;font-weight:bold;}
    .safe{color:#22c55e;} .breach{color:#ef4444;} .warn{color:#facc15;}
  </style>
</head>
<body>
<nav>
  <div class="logo">CyberDefence</div>
  <button class="nav-toggle" onclick="toggleNav()">☰</button>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="card.html">Tools</a></li>
    <li><a href="card.html">Attack Lab</a></li>
    <li><a href="https://vishnu-profile.lovable.app">About</a></li>
    <li><a href="https://vishnu-profile.lovable.app">Contact</a></li>
  </ul>
  <div id="authArea"><a href="index.html" class="btn">Login</a></div>
</nav>

<div class="email-wrap">
  <div class="email-card">
    <h1>🛡️ Email Breach Checker</h1>
    <p>Check if your email was exposed in data breaches</p>
    <input type="email" id="emailInput" placeholder="Enter your email"/>
    <button onclick="checkEmail()">Check Now</button>
    <div id="result" class="result-email"></div>
  </div>
</div>

<script type="module">
  import { db, auth } from './firebase-config.js';
  import { onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { ref, push }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  let currentUser = null;
  onAuthStateChanged(auth, user => {
    currentUser = user;
    const area = document.getElementById('authArea');
    if (user) {
      const name = user.email.split('@')[0];
      area.innerHTML = `<span style="color:#38bdf8;font-size:.85rem;">👋 ${name}</span>
        <button style="background:none;border:1px solid rgba(239,68,68,.4);color:#ef4444;border-radius:20px;padding:4px 12px;font-size:.8rem;cursor:pointer;margin-left:6px;" onclick="doLogout()">Logout</button>`;
    }
  });
  window.doLogout  = () => signOut(auth).then(() => location.href='index.html');
  window.toggleNav = () => document.getElementById('navLinks').classList.toggle('open');

  window.checkEmail = async () => {
    const email  = document.getElementById('emailInput').value.trim();
    const result = document.getElementById('result');
    if (!email) { result.innerHTML='⚠️ Please enter an email'; result.className='result-email warn'; return; }

    const breached = ['hack@gmail.com','test@123.com','admin@breach.com','leaked@test.com'];
    const isBreached = breached.includes(email.toLowerCase());

    result.innerHTML  = isBreached
      ? '🔴 BREACHED!<br>Found in data leaks.<br>⚠️ Change your password immediately!'
      : '🟢 SAFE<br>No known breaches found.';
    result.className  = 'result-email ' + (isBreached ? 'breach' : 'safe');

    try {
      await push(ref(db,'emailChecks'), {
        email, isBreached,
        user:      currentUser ? currentUser.email : 'anonymous',
        timestamp: Date.now()
      });
    } catch(e) { console.log(e); }
  };
</script>
</body>
</html>
